<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#163642"/>
      <stop offset="1" stop-color="#09161E"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.28" r="0.36">
      <stop offset="0" stop-color="#FFD282" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFD282" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile">
      <rect x="0" y="0" width="1024" height="1024" rx="225.28" ry="225.28"/>
    </clipPath>
    <filter id="winShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#tile)">
    <!-- Background -->
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#halo)"/>

    <!-- Trunk -->
    <polygon points="486.40,675.84 537.60,675.84 578.56,952.32 445.44,952.32" fill="#8A5C2E"/>
