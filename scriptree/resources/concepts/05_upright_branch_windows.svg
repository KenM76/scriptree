<path d="M588.80,952.32 L645.12,952.32 A56.32,56.32 0 0 0 588.80,896.00 Z" fill="#8A5C2E"/>

    <!-- ">_" prompt on trunk -->
    <polyline points="471.04,786.43 503.81,819.20 471.04,851.97"
              fill="none" stroke="#FFD666" stroke-width="17.41"
              stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="514.05" y="843.26" width="56.32" height="17.41"
          rx="8.70" ry="8.70" fill="#FFD666"/>

    <!-- Branch skeleton (mint) -->
    <g stroke="#56D6A8" stroke-width="28.67" stroke-linecap="butt">
      <line x1="225.28" y1="675.84" x2="798.72" y2="675.84"/>
      <line x1="225.28" y1="675.84" x2="225.28" y2="389.12"/>
      <line x1="798.72" y1="675.84" x2="798.72" y2="389.12"/>
      <line x1="512.00" y1="675.84" x2="512.00" y2="389.12"/>
      <line x1="368.64" y1="389.12" x2="655.36" y2="389.12"/>
      <line x1="368.64" y1="389.12" x2="368.64" y2="184.32"/>
      <line x1="655.36" y1="389.12" x2="655.36" y2="184.32"/>
    </g>

    <!-- Junction dots -->
    <g fill="#B0F6D6">
      <circle cx="225.28" cy="675.84" r="20.48"/>
      <circle cx="512.00" cy="675.84" r="20.48"/>
      <circle cx="798.72" cy="675.84" r="20.48"/>
      <circle cx="368.64" cy="389.12" r="20.48"/>
      <circle cx="512.00" cy="389.12" r="20.48"/>
      <circle cx="655.36" cy="389.12" r="20.48"/>
    </g>

